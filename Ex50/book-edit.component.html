<div class="container">
  <h2>Edit Book Information</h2>

  <div *ngIf="errMessage" class="alert alert-danger">
    {{errMessage}}
  </div>

  <div *ngIf="successMessage" class="alert alert-success">
    {{successMessage}}
  </div>

  <form class="form">
    <div class="form-group">
      <label>Book ID: <span class="required">*</span></label>
      <input type="text" class="form-control" name="BookId" placeholder="Enter Book ID"
        [(ngModel)]="book.BookId" disabled />
    </div>

    <div class="form-group">
      <label>Book Name: <span class="required">*</span></label>
      <input type="text" class="form-control" name="BookName" placeholder="Enter Book Name"
        [(ngModel)]="book.BookName" />
    </div>

    <div class="form-group">
      <label>Author:</label>
      <input type="text" class="form-control" name="Author" placeholder="Enter Author Name"
        [(ngModel)]="book.Author" />
    </div>

    <div class="form-group">
      <label>Description:</label>
      <textarea class="form-control" name="Description" placeholder="Enter Book Description"
        [(ngModel)]="book.Description"></textarea>
    </div>

    <div class="form-group">
      <label>Price: <span class="required">*</span></label>
      <input type="number" class="form-control" name="Price" placeholder="Enter Price"
        [(ngModel)]="book.Price" />
    </div>

    <div class="form-group">
      <label>Image:</label>
      <input type="text" class="form-control" name="Image" placeholder="Enter Image Name"
        [(ngModel)]="book.Image" />
    </div>

    <div class="form-group">
      <label>Publish Date:</label>
      <input type="date" class="form-control" name="Publish_Date"
        [(ngModel)]="book.Publish_Date" />
    </div>

    <div class="form-actions">
      <button type="button" (click)="putBook()" class="btn btn-warning">Update</button>
      <button type="button" (click)="cancel()" class="btn btn-secondary">Cancel</button>
    </div>
  </form>
</div>
