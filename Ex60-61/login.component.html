<div class="container">
  <div class="card">
    <div class="card-header">Login System</div>
    <div class="card-body">
      <form>
        <div class="mb-3">
          <label for="name-reg" class="form-label">User Name:</label>
          <input type="text" class="form-control" id="name-reg" name="name" [(ngModel)]="name" placeholder="Enter your username">
        </div>
        <div class="mb-3">
          <label for="password-reg" class="form-label">Password:</label>
          <input type="password" class="form-control" id="password-reg" name="password" [(ngModel)]="password" placeholder="Enter your password">
        </div>

        <button type="button" class="btn btn-primary" (click)="login()">Login</button>
        <button type="button" class="btn btn-success" (click)="register()">Register</button>
        <button type="button" class="btn btn-warning" (click)="logout()">Logout</button>
      </form>
      <div class="mt-3" *ngIf="message">
        <p>{{ message }}</p>
      </div>
    </div>
  </div>
</div>
